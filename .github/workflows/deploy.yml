name: Deploy to IONOS Server

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Deploy to IONOS Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 212.227.20.190
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 20m
          command_timeout: 20m
          script: |
            echo "🚀 Starting BidBlitz Deployment..."
            echo "📅 $(date)"
            
            # ==================== 1. Git Pull ====================
            echo "📥 Pulling latest code..."
            cd /var/www/bidblitz
            
            # Show current state
            echo "🔍 Current commit BEFORE pull:"
            git log -1 --oneline
            
            # Fetch and reset
            git fetch origin main --force
            git reset --hard origin/main
            
            # Show new state
            echo "📌 Latest commit AFTER pull:"
            git log -1 --oneline
            
            # Verify HomeModern.jsx has SERVICES
            echo "🔍 Checking if SERVICES exists in HomeModern.jsx:"
            grep -c "SERVICES" frontend/src/pages/HomeModern.jsx || echo "❌ SERVICES NOT FOUND!"
            
            # ==================== 2. Backend Update ====================
            echo "📦 Updating backend dependencies..."
            cd /var/www/bidblitz/backend
            source venv/bin/activate
            
            # Remove emergentintegrations from requirements if present
            sed -i '/emergentintegrations/d' requirements.txt 2>/dev/null || true
            
            # Install dependencies
            pip install -r requirements.txt --quiet 2>/dev/null || echo "⚠️ Some pip packages may have failed"
            deactivate
            
            # ==================== 3. Frontend Build ====================
            echo "🎨 Building frontend..."
            cd /var/www/bidblitz/frontend
            
            # Cleanup: Remove ALL symlinks and broken files in games folder
            echo "🧹 Cleaning up games folder..."
            find public/games -maxdepth 1 -type l -exec rm -f {} \; 2>/dev/null || true
            rm -f public/games/word.html 2>/dev/null || true
            
            # Create word.html
            if [ -f "public/games/word_hunt.html" ]; then
                cp public/games/word_hunt.html public/games/word.html
                echo "✅ Created word.html from word_hunt.html"
            else
                echo '<!DOCTYPE html><html><head><title>Word Game</title></head><body><h1>Word Game</h1><p>Coming soon!</p></body></html>' > public/games/word.html
                echo "✅ Created placeholder word.html"
            fi
            
            # Verify word.html exists
            ls -la public/games/word.html
            
            # Clear old build
            rm -rf build node_modules/.cache
            
            # Install dependencies
            yarn install --frozen-lockfile --silent || yarn install --silent
            
            # Build with increased memory
            echo "🔨 Starting build..."
            NODE_OPTIONS="--max-old-space-size=2048" yarn build
            
            # Verify build
            if [ -d "build" ]; then
                echo "✅ Build successful!"
                echo "📊 Build size: $(du -sh build | cut -f1)"
            else
                echo "❌ Build failed!"
                exit 1
            fi
            
            # ==================== 4. Restart Services ====================
            echo "🔄 Restarting services..."
            
            # Clear ALL caches
            rm -rf /var/cache/nginx/* 2>/dev/null || true
            
            # Add cache-busting: Update index.html with timestamp
            TIMESTAMP=$(date +%s)
            sed -i "s|</head>|<meta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\"><meta http-equiv=\"Pragma\" content=\"no-cache\"><meta http-equiv=\"Expires\" content=\"0\"><meta name=\"version\" content=\"${TIMESTAMP}\"></head>|" /var/www/bidblitz/frontend/build/index.html 2>/dev/null || true
            
            # Restart services
            systemctl restart bidblitz-backend || true
            sleep 2
            systemctl reload nginx || systemctl restart nginx
            
            # Force Nginx to clear proxy cache
            nginx -s reload 2>/dev/null || true
            
            # ==================== 5. Verification ====================
            echo "🔍 Final verification..."
            
            # Update Nginx config for no-cache headers
            if [ -f "/var/www/bidblitz/server-config/nginx.conf" ]; then
                cp /var/www/bidblitz/server-config/nginx.conf /etc/nginx/sites-available/bidblitz 2>/dev/null || true
                ln -sf /etc/nginx/sites-available/bidblitz /etc/nginx/sites-enabled/ 2>/dev/null || true
                nginx -t && systemctl reload nginx
                echo "✅ Nginx config updated with no-cache headers"
            fi
            
            # Check backend
            curl -s http://localhost:8001/api/health && echo "" || echo "⚠️ Backend check failed"
            
            # Done
            echo ""
            echo "✅ Deployment completed!"
            echo "📅 $(date)"
            echo "🌐 Visit https://bidblitz.ae (no cache refresh needed!)"
