name: Deploy to IONOS Server

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Deploy to IONOS Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 212.227.20.190
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 20m
          command_timeout: 20m
          script: |
            set -e
            echo "🚀 Starting BidBlitz Deployment..."
            echo "📅 $(date)"
            
            # ==================== 1. Git Pull ====================
            echo "📥 Pulling latest code..."
            cd /var/www/bidblitz
            git fetch origin main
            git reset --hard origin/main
            
            # Show last commit
            echo "📌 Latest commit:"
            git log -1 --oneline
            
            # ==================== 2. Backend Update ====================
            echo "📦 Updating backend dependencies..."
            cd /var/www/bidblitz/backend
            source venv/bin/activate
            
            # Remove emergentintegrations from requirements if present (not available on public PyPI)
            sed -i '/emergentintegrations/d' requirements.txt 2>/dev/null || true
            
            # Install dependencies (ignore errors for missing packages)
            pip install -r requirements.txt --quiet || {
                echo "⚠️ Some packages failed, trying without problematic ones..."
                grep -v "emergentintegrations" requirements.txt > requirements_clean.txt
                pip install -r requirements_clean.txt --quiet
            }
            
            # Install emergentintegrations from private index (optional)
            pip install emergentintegrations --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ --quiet 2>/dev/null || echo "ℹ️ emergentintegrations skipped (private package)"
            deactivate
            
            # ==================== 3. Frontend Build ====================
            echo "🎨 Building frontend..."
            cd /var/www/bidblitz/frontend
            
            # Fix missing word.html (copy from word_hunt.html if exists)
            if [ -f "public/games/word_hunt.html" ] && [ ! -f "public/games/word.html" ]; then
                cp public/games/word_hunt.html public/games/word.html
                echo "✅ Created word.html from word_hunt.html"
            fi
            
            # Remove broken symlinks in games folder
            find public/games -type l ! -exec test -e {} \; -delete 2>/dev/null || true
            
            # Clear old build
            rm -rf build
            
            # Install dependencies
            yarn install --frozen-lockfile --silent
            
            # Build with increased memory
            NODE_OPTIONS="--max-old-space-size=2048" yarn build
            
            # Verify build created
            if [ ! -d "build" ]; then
                echo "❌ ERROR: Frontend build failed - no build directory!"
                exit 1
            fi
            
            # Show build info
            echo "📁 Build directory contents:"
            ls -la build/
            echo "📊 Build size: $(du -sh build | cut -f1)"
            
            # ==================== 4. Clear Nginx Cache ====================
            echo "🧹 Clearing Nginx cache..."
            rm -rf /var/cache/nginx/* 2>/dev/null || true
            
            # ==================== 5. Restart Services ====================
            echo "🔄 Restarting services..."
            
            # Restart backend
            systemctl restart bidblitz-backend
            sleep 2
            
            # Test backend health
            if curl -s http://localhost:8001/api/health | grep -q "healthy"; then
                echo "✅ Backend is healthy"
            else
                echo "⚠️ Backend health check failed"
                journalctl -u bidblitz-backend -n 20 --no-pager
            fi
            
            # Restart Nginx
            systemctl reload nginx
            
            # ==================== 6. Verification ====================
            echo "🔍 Verifying deployment..."
            
            # Check if index.html has new content
            echo "📄 Index.html preview:"
            head -20 /var/www/bidblitz/frontend/build/index.html
            
            # Check Nginx status
            systemctl status nginx --no-pager -l || true
            
            # ==================== Done ====================
            echo ""
            echo "✅ Deployment completed successfully!"
            echo "📅 $(date)"
            echo "🌐 Visit https://bidblitz.ae to verify"
