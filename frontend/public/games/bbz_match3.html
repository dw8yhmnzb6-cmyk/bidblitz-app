<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍬 Candy Match - BidBlitz</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: 'Segoe UI', 'Arial Rounded MT Bold', sans-serif;
    background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #6c5ce7 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    overflow-x: hidden;
}

.header {
    text-align: center;
    margin-bottom: 15px;
    width: 100%;
    max-width: 400px;
}

.logo {
    font-size: 32px;
    font-weight: 900;
    color: white;
    text-shadow: 3px 3px 0 #c44569, 
                 -1px -1px 0 #ff9ff3,
                 4px 4px 10px rgba(0,0,0,0.3);
    margin-bottom: 5px;
}

.stats-bar {
    display: flex;
    justify-content: space-around;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 10px 15px;
    margin-bottom: 10px;
}

.stat {
    text-align: center;
}

.stat-value {
    font-size: 24px;
    font-weight: 900;
    color: white;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
}

.stat-label {
    font-size: 10px;
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.game-container {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    padding: 15px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    border: 3px solid rgba(255,255,255,0.3);
}

#board {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
}

.candy {
    width: 45px;
    height: 45px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    user-select: none;
}

.candy:active {
    transform: scale(0.9);
}

.candy.selected {
    animation: pulse 0.5s ease infinite;
    box-shadow: 0 0 20px white, 0 0 40px white;
}

.candy.matched {
    animation: pop 0.3s ease forwards;
}

.candy.falling {
    animation: fall 0.3s ease;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

@keyframes pop {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
    100% { transform: scale(0); opacity: 0; }
}

@keyframes fall {
    0% { transform: translateY(-50px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
}

.candy-red { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
.candy-orange { background: linear-gradient(135deg, #ffa502, #ff7f00); }
.candy-yellow { background: linear-gradient(135deg, #ffd93d, #ffbe0b); }
.candy-green { background: linear-gradient(135deg, #26de81, #20bf6b); }
.candy-blue { background: linear-gradient(135deg, #54a0ff, #2e86de); }
.candy-purple { background: linear-gradient(135deg, #a55eea, #8854d0); }

.combo-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 48px;
    font-weight: 900;
    color: white;
    text-shadow: 3px 3px 0 #ff6b9d, 6px 6px 20px rgba(0,0,0,0.5);
    z-index: 100;
    pointer-events: none;
    animation: comboShow 0.8s ease forwards;
}

@keyframes comboShow {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
    50% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0; }
}

.score-popup {
    position: absolute;
    font-size: 18px;
    font-weight: 900;
    color: #ffd93d;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    animation: scoreFloat 1s ease forwards;
    pointer-events: none;
    z-index: 50;
}

@keyframes scoreFloat {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-50px); opacity: 0; }
}

.buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
    width: 100%;
    max-width: 400px;
}

.btn {
    flex: 1;
    padding: 15px;
    border: none;
    border-radius: 15px;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.btn:active {
    transform: scale(0.95);
}

.btn-restart {
    background: linear-gradient(135deg, #ffd93d, #ff9f43);
    color: #6d4c00;
    box-shadow: 0 5px 20px rgba(255, 217, 61, 0.4);
}

.btn-hint {
    background: linear-gradient(135deg, #a55eea, #8854d0);
    color: white;
    box-shadow: 0 5px 20px rgba(165, 94, 234, 0.4);
}

.progress-bar {
    width: 100%;
    max-width: 400px;
    height: 20px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffd93d, #ff6b9d);
    border-radius: 10px;
    transition: width 0.3s ease;
}

.level-badge {
    background: linear-gradient(135deg, #ffd93d, #ff9f43);
    color: #6d4c00;
    padding: 5px 15px;
    border-radius: 20px;
    font-weight: 900;
    font-size: 12px;
    display: inline-block;
    margin-bottom: 10px;
}

@media (max-width: 400px) {
    .candy {
        width: 40px;
        height: 40px;
        font-size: 26px;
    }
    #board {
        gap: 4px;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">🍬 Candy Match</div>
    <span class="level-badge">⭐ LEVEL 1</span>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width: 0%"></div>
    </div>
    
    <div class="stats-bar">
        <div class="stat">
            <div class="stat-value" id="score">0</div>
            <div class="stat-label">Score</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="moves">30</div>
            <div class="stat-label">Züge</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="target">500</div>
            <div class="stat-label">Ziel</div>
        </div>
    </div>
</div>

<div class="game-container">
    <div id="board"></div>
</div>

<div class="buttons">
    <button class="btn btn-restart" onclick="restartGame()">🔄 Neu</button>
    <button class="btn btn-hint" onclick="showHint()">💡 Tipp</button>
</div>

<script>
const COLS = 7;
const ROWS = 7;
const TARGET = 500;

const candies = [
    { type: 'red', emoji: '🍎', class: 'candy-red' },
    { type: 'orange', emoji: '🍊', class: 'candy-orange' },
    { type: 'yellow', emoji: '🍋', class: 'candy-yellow' },
    { type: 'green', emoji: '🍐', class: 'candy-green' },
    { type: 'blue', emoji: '🫐', class: 'candy-blue' },
    { type: 'purple', emoji: '🍇', class: 'candy-purple' }
];

let board = [];
let selected = null;
let score = 0;
let moves = 30;
let combo = 0;
let isProcessing = false;

const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const movesEl = document.getElementById('moves');
const progressEl = document.getElementById('progress');

function createBoard() {
    boardEl.innerHTML = '';
    board = [];
    
    for (let row = 0; row < ROWS; row++) {
        board[row] = [];
        for (let col = 0; col < COLS; col++) {
            const candy = createCandy(row, col);
            board[row][col] = candy;
        }
    }
    
    // Remove initial matches
    while (hasMatches()) {
        removeMatches(false);
        refillBoard();
    }
}

function createCandy(row, col) {
    const candyData = candies[Math.floor(Math.random() * candies.length)];
    const el = document.createElement('div');
    el.className = `candy ${candyData.class}`;
    el.innerHTML = candyData.emoji;
    el.dataset.row = row;
    el.dataset.col = col;
    el.dataset.type = candyData.type;
    el.addEventListener('click', () => selectCandy(row, col));
    boardEl.appendChild(el);
    return { el, type: candyData.type, emoji: candyData.emoji, class: candyData.class };
}

function selectCandy(row, col) {
    if (isProcessing || moves <= 0) return;
    
    const candy = board[row][col];
    if (!candy) return;
    
    if (selected === null) {
        selected = { row, col };
        candy.el.classList.add('selected');
    } else {
        const prev = board[selected.row][selected.col];
        prev.el.classList.remove('selected');
        
        // Check if adjacent
        const rowDiff = Math.abs(selected.row - row);
        const colDiff = Math.abs(selected.col - col);
        
        if ((rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1)) {
            swapCandies(selected.row, selected.col, row, col);
        }
        
        selected = null;
    }
}

function swapCandies(r1, c1, r2, c2) {
    isProcessing = true;
    
    // Swap in array
    const temp = board[r1][c1];
    board[r1][c1] = board[r2][c2];
    board[r2][c2] = temp;
    
    // Update positions
    updatePositions();
    
    setTimeout(() => {
        if (hasMatches()) {
            moves--;
            movesEl.textContent = moves;
            combo = 0;
            processMatches();
        } else {
            // Swap back
            const temp = board[r1][c1];
            board[r1][c1] = board[r2][c2];
            board[r2][c2] = temp;
            updatePositions();
            isProcessing = false;
        }
    }, 200);
}

function updatePositions() {
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            if (board[row][col]) {
                board[row][col].el.dataset.row = row;
                board[row][col].el.dataset.col = col;
            }
        }
    }
}

function hasMatches() {
    return findMatches().length > 0;
}

function findMatches() {
    const matches = new Set();
    
    // Horizontal
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS - 2; col++) {
            if (board[row][col] && board[row][col+1] && board[row][col+2]) {
                if (board[row][col].type === board[row][col+1].type && 
                    board[row][col+1].type === board[row][col+2].type) {
                    matches.add(`${row},${col}`);
                    matches.add(`${row},${col+1}`);
                    matches.add(`${row},${col+2}`);
                }
            }
        }
    }
    
    // Vertical
    for (let row = 0; row < ROWS - 2; row++) {
        for (let col = 0; col < COLS; col++) {
            if (board[row][col] && board[row+1][col] && board[row+2][col]) {
                if (board[row][col].type === board[row+1][col].type && 
                    board[row+1][col].type === board[row+2][col].type) {
                    matches.add(`${row},${col}`);
                    matches.add(`${row+1},${col}`);
                    matches.add(`${row+2},${col}`);
                }
            }
        }
    }
    
    return Array.from(matches).map(m => {
        const [r, c] = m.split(',').map(Number);
        return { row: r, col: c };
    });
}

function processMatches() {
    const matches = findMatches();
    
    if (matches.length > 0) {
        combo++;
        
        // Calculate score
        const points = matches.length * 10 * combo;
        score += points;
        scoreEl.textContent = score;
        
        // Update progress
        const progress = Math.min((score / TARGET) * 100, 100);
        progressEl.style.width = `${progress}%`;
        
        // Show combo
        if (combo > 1) {
            showCombo(combo);
        }
        
        // Show score popup
        if (matches.length > 0) {
            showScorePopup(matches[0], points);
        }
        
        // Remove matched candies
        matches.forEach(({ row, col }) => {
            if (board[row][col]) {
                board[row][col].el.classList.add('matched');
            }
        });
        
        setTimeout(() => {
            matches.forEach(({ row, col }) => {
                if (board[row][col]) {
                    board[row][col].el.remove();
                    board[row][col] = null;
                }
            });
            
            dropCandies();
            
            setTimeout(() => {
                fillEmptySpaces();
                
                setTimeout(() => {
                    if (hasMatches()) {
                        processMatches();
                    } else {
                        isProcessing = false;
                        checkGameState();
                    }
                }, 300);
            }, 200);
        }, 300);
    } else {
        isProcessing = false;
        checkGameState();
    }
}

function dropCandies() {
    for (let col = 0; col < COLS; col++) {
        let emptyRow = ROWS - 1;
        
        for (let row = ROWS - 1; row >= 0; row--) {
            if (board[row][col]) {
                if (row !== emptyRow) {
                    board[emptyRow][col] = board[row][col];
                    board[row][col] = null;
                    board[emptyRow][col].el.classList.add('falling');
                    setTimeout(() => {
                        board[emptyRow][col].el.classList.remove('falling');
                    }, 300);
                }
                emptyRow--;
            }
        }
    }
    updatePositions();
}

function fillEmptySpaces() {
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            if (!board[row][col]) {
                const candy = createCandy(row, col);
                candy.el.classList.add('falling');
                setTimeout(() => candy.el.classList.remove('falling'), 300);
                board[row][col] = candy;
            }
        }
    }
}

function refillBoard() {
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            if (!board[row][col]) {
                board[row][col] = {
                    type: candies[Math.floor(Math.random() * candies.length)].type,
                    emoji: candies[Math.floor(Math.random() * candies.length)].emoji
                };
            }
        }
    }
}

function removeMatches(animate) {
    const matches = findMatches();
    matches.forEach(({ row, col }) => {
        board[row][col] = null;
    });
}

function showCombo(num) {
    const popup = document.createElement('div');
    popup.className = 'combo-popup';
    popup.textContent = `${num}x COMBO!`;
    document.body.appendChild(popup);
    setTimeout(() => popup.remove(), 800);
}

function showScorePopup(pos, points) {
    const candy = board[pos.row]?.[pos.col]?.el;
    if (!candy) return;
    
    const rect = candy.getBoundingClientRect();
    const popup = document.createElement('div');
    popup.className = 'score-popup';
    popup.textContent = `+${points}`;
    popup.style.left = `${rect.left + rect.width/2}px`;
    popup.style.top = `${rect.top}px`;
    document.body.appendChild(popup);
    setTimeout(() => popup.remove(), 1000);
}

function showHint() {
    // Find a valid move
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS - 1; col++) {
            // Try horizontal swap
            const temp = board[row][col];
            board[row][col] = board[row][col+1];
            board[row][col+1] = temp;
            
            if (hasMatches()) {
                board[row][col+1] = board[row][col];
                board[row][col] = temp;
                
                board[row][col].el.classList.add('selected');
                board[row][col+1].el.classList.add('selected');
                setTimeout(() => {
                    board[row][col].el.classList.remove('selected');
                    board[row][col+1].el.classList.remove('selected');
                }, 1000);
                return;
            }
            
            board[row][col+1] = board[row][col];
            board[row][col] = temp;
        }
    }
}

function checkGameState() {
    if (score >= TARGET) {
        setTimeout(() => {
            alert(`🎉 Level geschafft! Score: ${score}`);
        }, 500);
    } else if (moves <= 0) {
        setTimeout(() => {
            alert(`😢 Spiel vorbei! Score: ${score}`);
        }, 500);
    }
}

function restartGame() {
    score = 0;
    moves = 30;
    combo = 0;
    isProcessing = false;
    selected = null;
    scoreEl.textContent = score;
    movesEl.textContent = moves;
    progressEl.style.width = '0%';
    createBoard();
}

createBoard();
</script>

</body>
</html>
