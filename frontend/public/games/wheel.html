<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎡 Lucky Wheel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      padding: 20px;
    }
    h1 { margin-bottom: 20px; }
    .wheel-container {
      position: relative;
      width: 320px;
      height: 320px;
    }
    #wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(
        #ef4444 0deg 45deg,
        #f59e0b 45deg 90deg,
        #10b981 90deg 135deg,
        #3b82f6 135deg 180deg,
        #8b5cf6 180deg 225deg,
        #ec4899 225deg 270deg,
        #14b8a6 270deg 315deg,
        #f97316 315deg 360deg
      );
      transition: transform 4s cubic-bezier(0.2, 0.8, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }
    .wheel-center {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 40px;
      filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3));
    }
    .prizes {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    .prize {
      position: absolute;
      font-size: 28px;
      transform-origin: center;
    }
    button {
      margin-top: 30px;
      padding: 18px 50px;
      font-size: 20px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(251, 191, 36, 0.4);
      transition: all 0.3s;
    }
    button:hover { transform: scale(1.05); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #result {
      margin-top: 20px;
      padding: 15px 30px;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      font-size: 20px;
      display: none;
    }
    .stats {
      margin-top: 20px;
      display: flex;
      gap: 20px;
      font-size: 16px;
    }
    .stats div {
      background: rgba(255,255,255,0.2);
      padding: 10px 20px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <h1>🎡 Lucky Wheel</h1>
  
  <div class="wheel-container">
    <div class="pointer">▼</div>
    <div id="wheel">
      <div class="wheel-center">🎰</div>
    </div>
    <div class="prizes">
      <div class="prize" style="top: 15%; left: 70%; transform: rotate(22deg)">5🪙</div>
      <div class="prize" style="top: 30%; left: 85%; transform: rotate(67deg)">10🪙</div>
      <div class="prize" style="top: 60%; left: 85%; transform: rotate(112deg)">20🪙</div>
      <div class="prize" style="top: 80%; left: 65%; transform: rotate(157deg)">50🪙</div>
      <div class="prize" style="top: 80%; left: 30%; transform: rotate(202deg)">💀</div>
      <div class="prize" style="top: 60%; left: 5%; transform: rotate(247deg)">15🪙</div>
      <div class="prize" style="top: 30%; left: 5%; transform: rotate(292deg)">25🪙</div>
      <div class="prize" style="top: 15%; left: 25%; transform: rotate(337deg)">100🪙</div>
    </div>
  </div>
  
  <button id="spinBtn" onclick="spin()">🎰 DREHEN!</button>
  
  <div id="result"></div>
  
  <div class="stats">
    <div>Spins: <span id="spins">0</span></div>
    <div>Gewonnen: <span id="total">0</span> 🪙</div>
  </div>

  <script>
    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');
    const result = document.getElementById('result');
    const spinsEl = document.getElementById('spins');
    const totalEl = document.getElementById('total');
    
    const prizes = [5, 10, 20, 50, 0, 15, 25, 100]; // 0 = skull (lose)
    let rotation = 0;
    let spins = 0;
    let total = 0;
    let spinning = false;
    
    function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      result.style.display = 'none';
      
      // Random prize
      const prizeIndex = Math.floor(Math.random() * prizes.length);
      const prize = prizes[prizeIndex];
      
      // Calculate rotation (each segment is 45 degrees)
      const segmentAngle = 360 / 8;
      const targetAngle = prizeIndex * segmentAngle + segmentAngle / 2;
      const fullRotations = 5 + Math.floor(Math.random() * 3);
      rotation += fullRotations * 360 + (360 - targetAngle);
      
      wheel.style.transform = `rotate(${rotation}deg)`;
      
      setTimeout(() => {
        spinning = false;
        spinBtn.disabled = false;
        spins++;
        spinsEl.textContent = spins;
        
        if (prize === 0) {
          result.innerHTML = '💀 Leider nichts gewonnen!';
          result.style.background = 'rgba(239, 68, 68, 0.5)';
        } else {
          total += prize;
          totalEl.textContent = total;
          result.innerHTML = `🎉 Gewonnen: <strong>${prize} Coins!</strong>`;
          result.style.background = 'rgba(16, 185, 129, 0.5)';
        }
        result.style.display = 'block';
      }, 4000);
    }
  </script>
</body>
</html>
