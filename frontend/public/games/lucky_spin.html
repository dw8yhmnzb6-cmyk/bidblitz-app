<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎡 Mega Wheel - BidBlitz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0515 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    overflow: hidden;
}

.container {
    text-align: center;
    padding: 20px;
}

.logo {
    font-size: 36px;
    font-weight: 900;
    background: linear-gradient(135deg, #ffd700, #ff6b6b, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 5px;
    animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
    0%, 100% { filter: drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
    50% { filter: drop-shadow(0 0 30px rgba(255,215,0,0.8)); }
}

.balance {
    font-size: 24px;
    margin-bottom: 20px;
}

.balance span {
    color: #ffd700;
    font-weight: 900;
}

.wheel-container {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 0 auto 30px;
}

.wheel-outer {
    position: absolute;
    inset: -15px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #ffd700, #ff6b6b, #a855f7, #3b82f6, #22c55e, #ffd700);
    animation: outerGlow 3s linear infinite;
}

@keyframes outerGlow {
    0% { filter: blur(5px) brightness(1); }
    50% { filter: blur(8px) brightness(1.3); }
    100% { filter: blur(5px) brightness(1); }
}

.wheel-border {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: #1a0a2e;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
}

#wheelCanvas {
    position: absolute;
    inset: 10px;
    border-radius: 50%;
}

.pointer {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 25px solid transparent;
    border-right: 25px solid transparent;
    border-top: 40px solid #ffd700;
    z-index: 10;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}

.pointer::after {
    content: '';
    position: absolute;
    top: -40px;
    left: -15px;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-top: 25px solid #ffeb3b;
}

.center-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    border: 4px solid #fff;
    font-size: 16px;
    font-weight: 900;
    color: #1a0a2e;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 5px 30px rgba(255,215,0,0.5);
    transition: all 0.3s;
}

.center-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
}

.center-btn:disabled {
    background: #666;
    cursor: not-allowed;
}

.prizes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 20px;
    max-width: 350px;
}

.prize-item {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.prize-icon {
    font-size: 24px;
}

.prize-value {
    font-size: 12px;
    color: #ffd700;
    font-weight: bold;
}

.result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
}

.result-overlay.show {
    opacity: 1;
    pointer-events: all;
}

.result-icon {
    font-size: 100px;
    animation: bounce 0.5s ease infinite;
}

@keyframes bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

.result-text {
    font-size: 48px;
    font-weight: 900;
    color: #ffd700;
    margin: 20px 0;
}

.result-btn {
    padding: 15px 40px;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    border: none;
    border-radius: 30px;
    color: #1a0a2e;
    cursor: pointer;
}

.history {
    margin-top: 20px;
    max-width: 350px;
}

.history-title {
    font-size: 14px;
    color: #888;
    margin-bottom: 10px;
}

.history-list {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.history-item {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}
</style>
</head>
<body>

<div class="container">
    <div class="logo">🎡 Mega Wheel</div>
    <div class="balance">Guthaben: <span id="balance">500</span></div>
    
    <div class="wheel-container">
        <div class="wheel-outer"></div>
        <div class="wheel-border"></div>
        <canvas id="wheelCanvas" width="300" height="300"></canvas>
        <div class="pointer"></div>
        <button class="center-btn" id="spinBtn" onclick="spin()">SPIN<br>50</button>
    </div>
    
    <div class="prizes">
        <div class="prize-item"><div class="prize-icon">💎</div><div class="prize-value">500</div></div>
        <div class="prize-item"><div class="prize-icon">🏆</div><div class="prize-value">200</div></div>
        <div class="prize-item"><div class="prize-icon">⭐</div><div class="prize-value">100</div></div>
        <div class="prize-item"><div class="prize-icon">🎁</div><div class="prize-value">50</div></div>
    </div>
    
    <div class="history">
        <div class="history-title">Letzte Spins</div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<div class="result-overlay" id="resultOverlay">
    <div class="result-icon" id="resultIcon">🎉</div>
    <div class="result-text" id="resultText">+100</div>
    <button class="result-btn" onclick="closeResult()">Weiter</button>
</div>

<script>
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');

const segments = [
    { label: '10', color: '#ef4444', value: 10, icon: '🎯' },
    { label: '25', color: '#f97316', value: 25, icon: '🎲' },
    { label: '50', color: '#eab308', value: 50, icon: '🎁' },
    { label: '100', color: '#22c55e', value: 100, icon: '⭐' },
    { label: '25', color: '#06b6d4', value: 25, icon: '🎲' },
    { label: '200', color: '#3b82f6', value: 200, icon: '🏆' },
    { label: '10', color: '#8b5cf6', value: 10, icon: '🎯' },
    { label: '500', color: '#ec4899', value: 500, icon: '💎' },
    { label: '50', color: '#f43f5e', value: 50, icon: '🎁' },
    { label: 'X2', color: '#ffd700', value: 'x2', icon: '✨' }
];

let balance = 500;
let rotation = 0;
let isSpinning = false;
let history = [];

const balanceEl = document.getElementById('balance');
const spinBtn = document.getElementById('spinBtn');
const resultOverlay = document.getElementById('resultOverlay');
const resultIcon = document.getElementById('resultIcon');
const resultText = document.getElementById('resultText');
const historyList = document.getElementById('historyList');

function drawWheel() {
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = canvas.width / 2 - 5;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const arcSize = (2 * Math.PI) / segments.length;
    
    segments.forEach((seg, i) => {
        const startAngle = i * arcSize + rotation;
        const endAngle = startAngle + arcSize;
        
        // Segment
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = seg.color;
        ctx.fill();
        
        // Border
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Icon & Label
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(startAngle + arcSize / 2);
        ctx.textAlign = 'center';
        ctx.fillStyle = 'white';
        ctx.font = 'bold 24px sans-serif';
        ctx.fillText(seg.icon, radius * 0.65, 8);
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText(seg.label, radius * 0.4, 5);
        ctx.restore();
    });
}

function spin() {
    if (isSpinning || balance < 50) return;
    
    isSpinning = true;
    balance -= 50;
    balanceEl.textContent = balance;
    spinBtn.disabled = true;
    
    const winIndex = Math.floor(Math.random() * segments.length);
    const extraSpins = 5 + Math.random() * 3;
    const segmentAngle = (2 * Math.PI) / segments.length;
    const targetRotation = rotation + (extraSpins * 2 * Math.PI) - (winIndex * segmentAngle) - (segmentAngle / 2);
    
    const startTime = Date.now();
    const duration = 5000;
    const startRotation = rotation;
    
    function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeOut = 1 - Math.pow(1 - progress, 4);
        
        rotation = startRotation + (targetRotation - startRotation) * easeOut;
        drawWheel();
        
        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            isSpinning = false;
            spinBtn.disabled = balance < 50;
            showResult(segments[winIndex]);
        }
    }
    
    animate();
}

function showResult(segment) {
    let winAmount = segment.value;
    
    if (segment.value === 'x2' && history.length > 0) {
        winAmount = history[history.length - 1] * 2;
    } else if (segment.value === 'x2') {
        winAmount = 100;
    }
    
    balance += winAmount;
    balanceEl.textContent = balance;
    
    history.push(winAmount);
    if (history.length > 10) history.shift();
    updateHistory();
    
    resultIcon.textContent = segment.icon;
    resultText.textContent = `+${winAmount}`;
    resultOverlay.classList.add('show');
}

function closeResult() {
    resultOverlay.classList.remove('show');
}

function updateHistory() {
    historyList.innerHTML = '';
    history.slice().reverse().forEach(value => {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.textContent = value > 100 ? '💎' : value > 50 ? '⭐' : '🎯';
        historyList.appendChild(item);
    });
}

drawWheel();
</script>

</body>
</html>
