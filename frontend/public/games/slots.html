<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidBlitz Slots</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

h1 {
    font-size: 32px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.balance {
    margin-bottom: 20px;
    font-size: 20px;
}

.balance span {
    color: #fbbf24;
    font-weight: bold;
}

.slot-machine {
    background: linear-gradient(135deg, #2d2d44, #1f1f35);
    padding: 30px;
    border-radius: 20px;
    border: 3px solid #fbbf24;
    box-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
}

.reels {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.reel {
    width: 80px;
    height: 100px;
    background: #1a1a2e;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    border: 2px solid #3b3b5c;
    overflow: hidden;
}

.reel.spinning {
    animation: spin 0.1s linear infinite;
}

@keyframes spin {
    0% { transform: translateY(-5px); }
    50% { transform: translateY(5px); }
    100% { transform: translateY(-5px); }
}

.spin-btn {
    width: 100%;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
}

.spin-btn:hover {
    transform: scale(1.02);
    box-shadow: 0 5px 20px rgba(239, 68, 68, 0.4);
}

.spin-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.result {
    margin-top: 20px;
    padding: 15px 30px;
    background: rgba(34, 197, 94, 0.2);
    border-radius: 10px;
    text-align: center;
    display: none;
}

.result.show {
    display: block;
}

.result.win {
    background: rgba(34, 197, 94, 0.3);
}

.result.lose {
    background: rgba(239, 68, 68, 0.2);
}

.paytable {
    margin-top: 30px;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    font-size: 14px;
}

.paytable h3 {
    margin-bottom: 10px;
    color: #fbbf24;
}

.paytable-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
}
</style>
</head>
<body>

<h1>🎰 BidBlitz Slots</h1>

<div class="balance">Guthaben: <span id="balance">100</span> Coins</div>

<div class="slot-machine">
    <div class="reels">
        <div class="reel" id="reel1">🍒</div>
        <div class="reel" id="reel2">🍋</div>
        <div class="reel" id="reel3">🍇</div>
    </div>
    
    <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 SPIN (10 Coins)</button>
</div>

<div class="result" id="result">
    <p id="resultText"></p>
</div>

<div class="paytable">
    <h3>Gewinntabelle</h3>
    <div class="paytable-row"><span>🍒🍒🍒</span><span>50x</span></div>
    <div class="paytable-row"><span>💎💎💎</span><span>100x</span></div>
    <div class="paytable-row"><span>7️⃣7️⃣7️⃣</span><span>200x</span></div>
    <div class="paytable-row"><span>🍋🍋🍋</span><span>30x</span></div>
    <div class="paytable-row"><span>🍇🍇🍇</span><span>20x</span></div>
</div>

<script>
const symbols = ['🍒', '🍋', '🍇', '🍊', '💎', '7️⃣'];
let balance = 100;
let spinning = false;

const balanceEl = document.getElementById('balance');
const spinBtn = document.getElementById('spinBtn');
const resultEl = document.getElementById('result');
const resultText = document.getElementById('resultText');

function spin() {
    if (spinning || balance < 10) return;
    
    spinning = true;
    balance -= 10;
    balanceEl.textContent = balance;
    spinBtn.disabled = true;
    resultEl.classList.remove('show', 'win', 'lose');
    
    const reels = [
        document.getElementById('reel1'),
        document.getElementById('reel2'),
        document.getElementById('reel3')
    ];
    
    reels.forEach(r => r.classList.add('spinning'));
    
    const results = [];
    
    reels.forEach((reel, i) => {
        setTimeout(() => {
            reel.classList.remove('spinning');
            const symbol = symbols[Math.floor(Math.random() * symbols.length)];
            reel.textContent = symbol;
            results.push(symbol);
            
            if (results.length === 3) {
                checkWin(results);
            }
        }, 500 + i * 500);
    });
}

function checkWin(results) {
    spinning = false;
    spinBtn.disabled = balance < 10;
    
    const [a, b, c] = results;
    let win = 0;
    
    if (a === b && b === c) {
        switch(a) {
            case '7️⃣': win = 200; break;
            case '💎': win = 100; break;
            case '🍒': win = 50; break;
            case '🍋': win = 30; break;
            case '🍇': win = 20; break;
            default: win = 15;
        }
    } else if (a === b || b === c || a === c) {
        win = 5;
    }
    
    if (win > 0) {
        balance += win;
        balanceEl.textContent = balance;
        resultText.textContent = `🎉 Gewonnen: ${win} Coins!`;
        resultEl.classList.add('show', 'win');
    } else {
        resultText.textContent = '😢 Kein Gewinn';
        resultEl.classList.add('show', 'lose');
    }
    
    spinBtn.disabled = balance < 10;
}
</script>

</body>
</html>
