<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidBlitz Memory</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
}

.stats {
    display: flex;
    gap: 30px;
    margin-bottom: 20px;
}

.stat-value {
    font-size: 24px;
    font-weight: bold;
    color: #fbbf24;
    text-align: center;
}

.stat-label {
    font-size: 12px;
    color: #64748b;
}

#board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 350px;
}

.card {
    width: 75px;
    height: 75px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    transition: all 0.3s;
    transform-style: preserve-3d;
}

.card:hover {
    transform: scale(1.05);
}

.card.flipped {
    background: linear-gradient(135deg, #f59e0b, #d97706);
}

.card.matched {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    cursor: default;
}

.btn {
    margin-top: 20px;
    padding: 12px 30px;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    border: none;
    border-radius: 25px;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.btn:hover {
    transform: scale(1.05);
}

.win-msg {
    margin-top: 20px;
    padding: 20px;
    background: rgba(34, 197, 94, 0.2);
    border-radius: 15px;
    text-align: center;
    display: none;
}

.win-msg.show {
    display: block;
}
</style>
</head>
<body>

<h1>🧠 Memory</h1>

<div class="stats">
    <div>
        <div class="stat-value" id="moves">0</div>
        <div class="stat-label">Züge</div>
    </div>
    <div>
        <div class="stat-value" id="pairs">0/8</div>
        <div class="stat-label">Paare</div>
    </div>
    <div>
        <div class="stat-value" id="time">0:00</div>
        <div class="stat-label">Zeit</div>
    </div>
</div>

<div id="board"></div>

<button class="btn" onclick="startGame()">🔄 Neu starten</button>

<div class="win-msg" id="winMsg">
    <h2>🎉 Gewonnen!</h2>
    <p>Du hast alle Paare gefunden!</p>
</div>

<script>
const emojis = ['🍎', '🍇', '🍋', '🍊', '🫐', '🍒', '🥝', '🍉'];
let cards = [];
let flipped = [];
let matched = 0;
let moves = 0;
let timer = null;
let seconds = 0;

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function startGame() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    cards = shuffle([...emojis, ...emojis]);
    flipped = [];
    matched = 0;
    moves = 0;
    seconds = 0;
    
    document.getElementById('moves').textContent = moves;
    document.getElementById('pairs').textContent = `0/8`;
    document.getElementById('winMsg').classList.remove('show');
    
    if (timer) clearInterval(timer);
    timer = setInterval(() => {
        seconds++;
        const min = Math.floor(seconds / 60);
        const sec = seconds % 60;
        document.getElementById('time').textContent = `${min}:${sec.toString().padStart(2, '0')}`;
    }, 1000);
    
    cards.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = i;
        card.dataset.emoji = emoji;
        card.textContent = '❓';
        card.addEventListener('click', () => flipCard(card));
        board.appendChild(card);
    });
}

function flipCard(card) {
    if (flipped.length >= 2) return;
    if (card.classList.contains('flipped')) return;
    if (card.classList.contains('matched')) return;
    
    card.classList.add('flipped');
    card.textContent = card.dataset.emoji;
    flipped.push(card);
    
    if (flipped.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        
        if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
            flipped[0].classList.add('matched');
            flipped[1].classList.add('matched');
            matched++;
            document.getElementById('pairs').textContent = `${matched}/8`;
            flipped = [];
            
            if (matched === 8) {
                clearInterval(timer);
                document.getElementById('winMsg').classList.add('show');
            }
        } else {
            setTimeout(() => {
                flipped[0].classList.remove('flipped');
                flipped[0].textContent = '❓';
                flipped[1].classList.remove('flipped');
                flipped[1].textContent = '❓';
                flipped = [];
            }, 1000);
        }
    }
}

startGame();
</script>

</body>
</html>
