<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍬 Candy Match</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #ff6b9d, #c44569);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      padding: 15px;
    }
    h1 { margin-bottom: 10px; font-size: 24px; }
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
      font-size: 16px;
    }
    .stats div {
      background: rgba(255,255,255,0.2);
      padding: 8px 15px;
      border-radius: 20px;
    }
    .stats span { font-weight: bold; }
    #grid {
      display: grid;
      grid-template-columns: repeat(6, 50px);
      gap: 5px;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 15px;
    }
    .candy {
      width: 50px;
      height: 50px;
      font-size: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .candy:hover { transform: scale(1.1); }
    .candy.selected { 
      transform: scale(1.15); 
      box-shadow: 0 0 15px rgba(255,255,255,0.8);
    }
    .candy.matched {
      animation: pop 0.3s forwards;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(0); opacity: 0; }
    }
    #message {
      margin-top: 15px;
      padding: 15px 30px;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }
    .win { background: rgba(16, 185, 129, 0.9); }
    button {
      margin-top: 15px;
      padding: 12px 30px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #c44569;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <h1>🍬 Candy Match</h1>
  <div class="stats">
    <div>Score: <span id="score">0</span></div>
    <div>Züge: <span id="moves">30</span></div>
    <div>Ziel: <span id="target">500</span></div>
  </div>
  
  <div id="grid"></div>
  
  <div id="message"></div>
  <button onclick="initGame()">🔄 Neues Spiel</button>

  <script>
    const candies = ['🍬', '🍭', '🍫', '🍩', '🧁', '🍪'];
    const grid = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const movesEl = document.getElementById('moves');
    const message = document.getElementById('message');
    
    let board = [];
    let selected = null;
    let score = 0;
    let moves = 30;
    const SIZE = 6;
    
    function initGame() {
      score = 0;
      moves = 30;
      selected = null;
      scoreEl.textContent = '0';
      movesEl.textContent = '30';
      message.style.display = 'none';
      
      board = [];
      for (let i = 0; i < SIZE * SIZE; i++) {
        board.push(candies[Math.floor(Math.random() * candies.length)]);
      }
      
      // Remove initial matches
      while (findMatches().length > 0) {
        for (let i = 0; i < SIZE * SIZE; i++) {
          board[i] = candies[Math.floor(Math.random() * candies.length)];
        }
      }
      
      render();
    }
    
    function render() {
      grid.innerHTML = '';
      board.forEach((candy, i) => {
        const div = document.createElement('div');
        div.className = 'candy';
        div.textContent = candy;
        div.onclick = () => selectCandy(i);
        if (selected === i) div.classList.add('selected');
        grid.appendChild(div);
      });
    }
    
    function selectCandy(index) {
      if (moves <= 0) return;
      
      if (selected === null) {
        selected = index;
      } else {
        // Check if adjacent
        const row1 = Math.floor(selected / SIZE);
        const col1 = selected % SIZE;
        const row2 = Math.floor(index / SIZE);
        const col2 = index % SIZE;
        
        const isAdjacent = (Math.abs(row1 - row2) + Math.abs(col1 - col2)) === 1;
        
        if (isAdjacent) {
          // Swap
          [board[selected], board[index]] = [board[index], board[selected]];
          
          const matches = findMatches();
          if (matches.length > 0) {
            moves--;
            movesEl.textContent = moves;
            processMatches();
          } else {
            // Swap back
            [board[selected], board[index]] = [board[index], board[selected]];
          }
        }
        selected = null;
      }
      render();
    }
    
    function findMatches() {
      const matches = new Set();
      
      // Horizontal
      for (let row = 0; row < SIZE; row++) {
        for (let col = 0; col < SIZE - 2; col++) {
          const i = row * SIZE + col;
          if (board[i] && board[i] === board[i+1] && board[i] === board[i+2]) {
            matches.add(i);
            matches.add(i+1);
            matches.add(i+2);
          }
        }
      }
      
      // Vertical
      for (let col = 0; col < SIZE; col++) {
        for (let row = 0; row < SIZE - 2; row++) {
          const i = row * SIZE + col;
          if (board[i] && board[i] === board[i+SIZE] && board[i] === board[i+SIZE*2]) {
            matches.add(i);
            matches.add(i+SIZE);
            matches.add(i+SIZE*2);
          }
        }
      }
      
      return [...matches];
    }
    
    function processMatches() {
      const matches = findMatches();
      if (matches.length === 0) {
        checkGameOver();
        return;
      }
      
      // Mark matched
      const cells = grid.querySelectorAll('.candy');
      matches.forEach(i => cells[i].classList.add('matched'));
      
      // Update score
      score += matches.length * 10;
      scoreEl.textContent = score;
      
      setTimeout(() => {
        // Remove matches
        matches.forEach(i => board[i] = null);
        
        // Drop candies
        for (let col = 0; col < SIZE; col++) {
          let emptyRow = SIZE - 1;
          for (let row = SIZE - 1; row >= 0; row--) {
            const i = row * SIZE + col;
            if (board[i] !== null) {
              const newI = emptyRow * SIZE + col;
              board[newI] = board[i];
              if (newI !== i) board[i] = null;
              emptyRow--;
            }
          }
          // Fill empty
          for (let row = emptyRow; row >= 0; row--) {
            board[row * SIZE + col] = candies[Math.floor(Math.random() * candies.length)];
          }
        }
        
        render();
        
        // Check for more matches
        setTimeout(() => processMatches(), 200);
      }, 300);
    }
    
    function checkGameOver() {
      if (score >= 500) {
        message.textContent = `🏆 Gewonnen! +${Math.floor(score/10)} Coins`;
        message.className = 'win';
        message.style.display = 'block';
      } else if (moves <= 0) {
        message.textContent = `⏱️ Zeit vorbei! Score: ${score}`;
        message.className = '';
        message.style.display = 'block';
      }
    }
    
    initGame();
  </script>
</body>
</html>
