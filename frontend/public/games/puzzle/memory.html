<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BidBlitz Memory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:24px;margin-bottom:10px}
.stats{display:flex;gap:20px;margin:15px 0;font-size:16px}
.stats span{color:#fbbf24;font-weight:bold}
#board{width:300px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:15px 0}
.card{aspect-ratio:1;background:#374151;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;transition:all 0.3s}
.card.flipped{background:#a855f7}
.card.matched{background:#22c55e}
button{padding:12px 25px;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold;background:#a855f7;color:#fff}
</style>
</head>
<body>
<h1>🧠 BidBlitz Memory</h1>
<div class="stats">
  <div>Moves: <span id="moves">0</span></div>
  <div>Pairs: <span id="pairs">0</span>/8</div>
</div>
<div id="board"></div>
<button onclick="newGame()">Neues Spiel</button>
<script>
const API = window.API_URL || '';
const emojis = ['🎮','🎰','💎','🎯','🏆','⚡','🔥','🌟'];
let cards = [];
let flipped = [];
let matched = 0;
let moves = 0;
let canFlip = true;
let userId = localStorage.getItem('userId') || 'guest';

function shuffle(arr) {
  for(let i=arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function newGame() {
  cards = shuffle([...emojis, ...emojis]);
  flipped = [];
  matched = 0;
  moves = 0;
  canFlip = true;
  document.getElementById('moves').innerText = 0;
  document.getElementById('pairs').innerText = '0';
  render();
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.onclick = () => flipCard(i);
    board.appendChild(card);
  });
}

function flipCard(i) {
  if(!canFlip || flipped.includes(i) || document.querySelectorAll('.card')[i].classList.contains('matched')) return;
  
  const cardEl = document.querySelectorAll('.card')[i];
  cardEl.classList.add('flipped');
  cardEl.innerText = cards[i];
  flipped.push(i);
  
  if(flipped.length === 2) {
    moves++;
    document.getElementById('moves').innerText = moves;
    canFlip = false;
    
    const [a, b] = flipped;
    if(cards[a] === cards[b]) {
      document.querySelectorAll('.card')[a].classList.add('matched');
      document.querySelectorAll('.card')[b].classList.add('matched');
      matched++;
      document.getElementById('pairs').innerText = matched;
      flipped = [];
      canFlip = true;
      
      if(matched === 8) {
        submitScore();
        setTimeout(() => alert('🎉 Gewonnen in ' + moves + ' Zügen!'), 300);
      }
    } else {
      setTimeout(() => {
        document.querySelectorAll('.card')[a].classList.remove('flipped');
        document.querySelectorAll('.card')[b].classList.remove('flipped');
        document.querySelectorAll('.card')[a].innerText = '';
        document.querySelectorAll('.card')[b].innerText = '';
        flipped = [];
        canFlip = true;
      }, 1000);
    }
  }
}

async function submitScore() {
  const score = Math.max(100 - moves * 2, 10);
  try {
    await fetch(API + '/api/games/score', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({user_id: userId, game_id: 'memory', score: score})
    });
  } catch(e) {}
}

newGame();
</script>
</body>
</html>
