<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BidBlitz 2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:24px;margin-bottom:10px}
.stats{display:flex;gap:20px;margin:15px 0;font-size:16px}
.stats span{color:#fbbf24;font-weight:bold}
#board{width:280px;height:280px;background:#1e293b;border-radius:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px}
.tile{background:#374151;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold}
.tile.t2{background:#eab308;color:#000}
.tile.t4{background:#f97316;color:#fff}
.tile.t8{background:#ef4444;color:#fff}
.tile.t16{background:#ec4899;color:#fff}
.tile.t32{background:#a855f7;color:#fff}
.tile.t64{background:#8b5cf6;color:#fff}
.tile.t128{background:#3b82f6;color:#fff}
.tile.t256{background:#22c55e;color:#fff}
.tile.t512{background:#14b8a6;color:#fff}
.tile.t1024{background:#06b6d4;color:#fff}
.tile.t2048{background:#fbbf24;color:#000}
.controls{display:grid;grid-template-columns:repeat(3,60px);gap:5px;margin:15px 0}
.control-btn{padding:15px;background:#374151;border:none;border-radius:10px;color:#fff;font-size:20px;cursor:pointer}
button{padding:12px 25px;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold;background:#a855f7;color:#fff}
</style>
</head>
<body>
<h1>🔢 BidBlitz 2048</h1>
<div class="stats">
  <div>Score: <span id="score">0</span></div>
  <div>Best: <span id="best">0</span></div>
</div>
<div id="board"></div>
<div class="controls">
  <div></div>
  <button class="control-btn" onclick="move('up')">▲</button>
  <div></div>
  <button class="control-btn" onclick="move('left')">◀</button>
  <button class="control-btn" onclick="move('down')">▼</button>
  <button class="control-btn" onclick="move('right')">▶</button>
</div>
<button onclick="newGame()">Neues Spiel</button>
<script>
const API = window.API_URL || '';
let grid = [];
let score = 0;
let best = parseInt(localStorage.getItem('2048best') || '0');
let userId = localStorage.getItem('userId') || 'guest';

document.getElementById('best').innerText = best;

function newGame() {
  grid = Array(16).fill(0);
  score = 0;
  document.getElementById('score').innerText = 0;
  addTile();
  addTile();
  render();
}

function addTile() {
  const empty = grid.map((v,i) => v===0?i:-1).filter(i=>i>=0);
  if(empty.length) {
    const idx = empty[Math.floor(Math.random()*empty.length)];
    grid[idx] = Math.random() < 0.9 ? 2 : 4;
  }
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  grid.forEach(v => {
    const tile = document.createElement('div');
    tile.className = 'tile' + (v ? ' t' + v : '');
    tile.innerText = v || '';
    board.appendChild(tile);
  });
}

function move(dir) {
  let moved = false;
  const getRow = (i) => Math.floor(i/4);
  const getCol = (i) => i%4;
  
  function slide(arr) {
    const filtered = arr.filter(v => v !== 0);
    const merged = [];
    for(let i=0; i<filtered.length; i++) {
      if(filtered[i] === filtered[i+1]) {
        merged.push(filtered[i]*2);
        score += filtered[i]*2;
        i++;
      } else {
        merged.push(filtered[i]);
      }
    }
    while(merged.length < 4) merged.push(0);
    return merged;
  }
  
  for(let i=0; i<4; i++) {
    let line = [];
    for(let j=0; j<4; j++) {
      const idx = dir==='left'||dir==='right' ? i*4+j : j*4+i;
      line.push(grid[idx]);
    }
    if(dir==='right'||dir==='down') line.reverse();
    const newLine = slide(line);
    if(dir==='right'||dir==='down') newLine.reverse();
    for(let j=0; j<4; j++) {
      const idx = dir==='left'||dir==='right' ? i*4+j : j*4+i;
      if(grid[idx] !== newLine[j]) moved = true;
      grid[idx] = newLine[j];
    }
  }
  
  if(moved) {
    addTile();
    document.getElementById('score').innerText = score;
    if(score > best) {
      best = score;
      localStorage.setItem('2048best', best);
      document.getElementById('best').innerText = best;
    }
  }
  render();
  checkWin();
}

function checkWin() {
  if(grid.includes(2048)) {
    submitScore();
    alert('🎉 Du hast 2048 erreicht!');
  }
  if(!grid.includes(0) && !canMove()) {
    submitScore();
    alert('Game Over! Score: ' + score);
  }
}

function canMove() {
  for(let i=0; i<16; i++) {
    if(i%4<3 && grid[i]===grid[i+1]) return true;
    if(i<12 && grid[i]===grid[i+4]) return true;
  }
  return false;
}

async function submitScore() {
  try {
    await fetch(API + '/api/games/score', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({user_id: userId, game_id: '2048', score: score})
    });
  } catch(e) {}
}

document.addEventListener('keydown', e => {
  const map = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};
  if(map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

newGame();
</script>
</body>
</html>
