<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BidBlitz Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:24px;margin-bottom:10px}
.stats{display:flex;gap:20px;margin:15px 0;font-size:16px}
.stats span{color:#fbbf24;font-weight:bold}
#game{width:300px;height:400px;background:#1e293b;position:relative;overflow:hidden;border-radius:10px;margin:10px 0}
#player{width:40px;height:40px;background:#a855f7;position:absolute;bottom:10px;border-radius:6px}
.coin{width:20px;height:20px;background:gold;position:absolute;border-radius:50%}
.controls{display:flex;gap:15px;margin:15px 0}
.control-btn{padding:15px 30px;background:#374151;border:none;border-radius:10px;color:#fff;font-size:16px;cursor:pointer}
button{padding:12px 25px;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold}
.primary{background:#a855f7;color:#fff}
</style>
</head>
<body>
<h1>🏃 BidBlitz Runner</h1>
<div class="stats">
  <div>Score: <span id="score">0</span></div>
</div>
<div id="game">
  <div id="player"></div>
</div>
<div class="controls">
  <button class="control-btn" onclick="moveLeft()">◀ Links</button>
  <button class="control-btn" onclick="moveRight()">Rechts ▶</button>
</div>
<button class="primary" onclick="claimReward()">Belohnung</button>
<script>
const API = window.API_URL || '';
const game = document.getElementById('game');
const player = document.getElementById('player');
let score = 0;
let playerX = 130;
let userId = localStorage.getItem('userId') || 'guest';

player.style.left = playerX + 'px';

function moveLeft() { playerX = Math.max(0, playerX - 40); player.style.left = playerX + 'px'; }
function moveRight() { playerX = Math.min(260, playerX + 40); player.style.left = playerX + 'px'; }

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') moveLeft();
  if(e.key === 'ArrowRight') moveRight();
});

function createCoin() {
  const coin = document.createElement('div');
  coin.className = 'coin';
  coin.style.left = Math.random() * 260 + 'px';
  coin.style.top = '-20px';
  game.appendChild(coin);
  
  const fall = setInterval(() => {
    const top = parseInt(coin.style.top) + 4;
    coin.style.top = top + 'px';
    
    if(top > 340 && parseInt(coin.style.left) < playerX + 40 && parseInt(coin.style.left) + 20 > playerX) {
      score += 10;
      document.getElementById('score').innerText = score;
      coin.remove();
      clearInterval(fall);
    }
    if(top > 400) { coin.remove(); clearInterval(fall); }
  }, 30);
}

setInterval(createCoin, 1000);

async function claimReward() {
  if(score < 10) return;
  const reward = Math.floor(score / 10);
  try {
    await fetch(API + '/api/games/score', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({user_id: userId, game_id: 'runner', score: score})
    });
  } catch(e) {}
  alert('+' + reward + ' Coins!');
  score = 0;
  document.getElementById('score').innerText = 0;
}
</script>
</body>
</html>
