<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BidBlitz Snake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:24px;margin-bottom:10px}
.stats{display:flex;gap:20px;margin:15px 0;font-size:16px}
.stats span{color:#fbbf24;font-weight:bold}
#game{border:2px solid #374151;border-radius:10px}
.controls{display:grid;grid-template-columns:repeat(3,60px);gap:5px;margin:15px 0}
.control-btn{padding:15px;background:#374151;border:none;border-radius:10px;color:#fff;font-size:20px;cursor:pointer}
.control-btn:active{background:#4b5563}
button{padding:12px 25px;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold;background:#a855f7;color:#fff}
</style>
</head>
<body>
<h1>🐍 BidBlitz Snake</h1>
<div class="stats">
  <div>Score: <span id="score">0</span></div>
  <div>High: <span id="high">0</span></div>
</div>
<canvas id="game" width="300" height="300"></canvas>
<div class="controls">
  <div></div>
  <button class="control-btn" onclick="changeDir('up')">▲</button>
  <div></div>
  <button class="control-btn" onclick="changeDir('left')">◀</button>
  <button class="control-btn" onclick="changeDir('down')">▼</button>
  <button class="control-btn" onclick="changeDir('right')">▶</button>
</div>
<button onclick="startGame()">Start</button>
<script>
const API = window.API_URL || '';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const size = 15;
const cols = 20;
const rows = 20;
let snake = [{x:10,y:10}];
let food = {x:15,y:15};
let dir = {x:0,y:0};
let score = 0;
let high = parseInt(localStorage.getItem('snakeHigh') || '0');
let gameLoop;
let userId = localStorage.getItem('userId') || 'guest';

document.getElementById('high').innerText = high;

function draw() {
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0,0,300,300);
  
  ctx.fillStyle = '#22c55e';
  snake.forEach(s => ctx.fillRect(s.x*size,s.y*size,size-1,size-1));
  
  ctx.fillStyle = '#ef4444';
  ctx.fillRect(food.x*size,food.y*size,size-1,size-1);
}

function update() {
  const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  
  if(head.x<0||head.x>=cols||head.y<0||head.y>=rows||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver();
    return;
  }
  
  snake.unshift(head);
  
  if(head.x===food.x && head.y===food.y) {
    score += 10;
    document.getElementById('score').innerText = score;
    food = {x:Math.floor(Math.random()*cols), y:Math.floor(Math.random()*rows)};
  } else {
    snake.pop();
  }
  
  draw();
}

function changeDir(d) {
  const dirs = {up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
  const newDir = dirs[d];
  if(dir.x !== -newDir.x || dir.y !== -newDir.y) dir = newDir;
}

document.addEventListener('keydown', e => {
  const map = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};
  if(map[e.key]) changeDir(map[e.key]);
});

function startGame() {
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  score = 0;
  document.getElementById('score').innerText = 0;
  food = {x:15,y:15};
  clearInterval(gameLoop);
  gameLoop = setInterval(update, 150);
}

async function gameOver() {
  clearInterval(gameLoop);
  if(score > high) {
    high = score;
    localStorage.setItem('snakeHigh', high);
    document.getElementById('high').innerText = high;
  }
  
  try {
    await fetch(API + '/api/games/score', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({user_id: userId, game_id: 'snake', score: score})
    });
  } catch(e) {}
  
  alert('Game Over! Score: ' + score);
}

draw();
</script>
</body>
</html>
