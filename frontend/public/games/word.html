<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔤 Word Hunt - BidBlitz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #134e5e 0%, #71b280 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    color: white;
}

.header {
    text-align: center;
    margin-bottom: 20px;
    width: 100%;
    max-width: 400px;
}

.logo {
    font-size: 32px;
    font-weight: 900;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    margin-bottom: 5px;
}

.stats-bar {
    display: flex;
    justify-content: space-around;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 12px;
}

.stat {
    text-align: center;
}

.stat-value {
    font-size: 22px;
    font-weight: 900;
}

.stat-label {
    font-size: 10px;
    opacity: 0.8;
}

.word-display {
    background: rgba(0,0,0,0.3);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

.letter-slot {
    width: 45px;
    height: 55px;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    text-transform: uppercase;
}

.letter-slot.filled {
    background: rgba(255,255,255,0.2);
    border-color: #ffd700;
}

.letter-slot.correct {
    background: #22c55e;
    border-color: #22c55e;
}

.letter-slot.wrong {
    background: #ef4444;
    border-color: #ef4444;
    animation: shake 0.3s;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}

.keyboard {
    width: 100%;
    max-width: 400px;
}

.keyboard-row {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-bottom: 8px;
}

.key {
    min-width: 32px;
    height: 50px;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    color: #134e5e;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
}

.key:active {
    transform: scale(0.95);
    background: #ffd700;
}

.key.wide {
    min-width: 60px;
    font-size: 14px;
}

.key.used {
    background: #64748b;
    color: white;
}

.key.correct {
    background: #22c55e;
    color: white;
}

.key.present {
    background: #eab308;
    color: white;
}

.message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.9);
    padding: 20px 40px;
    border-radius: 15px;
    font-size: 24px;
    font-weight: bold;
    z-index: 100;
    display: none;
}

.message.show {
    display: block;
    animation: popIn 0.3s ease;
}

@keyframes popIn {
    0% { transform: translate(-50%, -50%) scale(0); }
    100% { transform: translate(-50%, -50%) scale(1); }
}

.hint {
    margin-top: 15px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">🔤 Word Hunt</div>
    
    <div class="stats-bar">
        <div class="stat">
            <div class="stat-value" id="score">0</div>
            <div class="stat-label">Score</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="streak">0</div>
            <div class="stat-label">Streak</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="tries">6</div>
            <div class="stat-label">Versuche</div>
        </div>
    </div>
</div>

<div class="word-display" id="wordDisplay"></div>

<div class="keyboard">
    <div class="keyboard-row">
        <button class="key" data-key="q">Q</button>
        <button class="key" data-key="w">W</button>
        <button class="key" data-key="e">E</button>
        <button class="key" data-key="r">R</button>
        <button class="key" data-key="t">T</button>
        <button class="key" data-key="z">Z</button>
        <button class="key" data-key="u">U</button>
        <button class="key" data-key="i">I</button>
        <button class="key" data-key="o">O</button>
        <button class="key" data-key="p">P</button>
    </div>
    <div class="keyboard-row">
        <button class="key" data-key="a">A</button>
        <button class="key" data-key="s">S</button>
        <button class="key" data-key="d">D</button>
        <button class="key" data-key="f">F</button>
        <button class="key" data-key="g">G</button>
        <button class="key" data-key="h">H</button>
        <button class="key" data-key="j">J</button>
        <button class="key" data-key="k">K</button>
        <button class="key" data-key="l">L</button>
    </div>
    <div class="keyboard-row">
        <button class="key wide" data-key="enter">✓</button>
        <button class="key" data-key="y">Y</button>
        <button class="key" data-key="x">X</button>
        <button class="key" data-key="c">C</button>
        <button class="key" data-key="v">V</button>
        <button class="key" data-key="b">B</button>
        <button class="key" data-key="n">N</button>
        <button class="key" data-key="m">M</button>
        <button class="key wide" data-key="back">⌫</button>
    </div>
</div>

<div class="hint" id="hint"></div>

<div class="message" id="message"></div>

<script>
const words = [
    { word: 'SPIEL', hint: 'Was du gerade machst' },
    { word: 'GELD', hint: 'Man braucht es zum Kaufen' },
    { word: 'HAUS', hint: 'Wo man wohnt' },
    { word: 'AUTO', hint: 'Fahrzeug mit 4 Rädern' },
    { word: 'HAND', hint: 'Teil des Arms' },
    { word: 'BERG', hint: 'Hohe Erhebung' },
    { word: 'BAUM', hint: 'Wächst im Wald' },
    { word: 'BUCH', hint: 'Man kann es lesen' },
    { word: 'HUND', hint: 'Bester Freund des Menschen' },
    { word: 'KATZE', hint: 'Miaut' },
    { word: 'SONNE', hint: 'Scheint am Tag' },
    { word: 'MOND', hint: 'Leuchtet nachts' },
    { word: 'STERN', hint: 'Funkelt am Himmel' },
    { word: 'BLUME', hint: 'Wächst im Garten' },
    { word: 'VOGEL', hint: 'Kann fliegen' }
];

let currentWord;
let currentHint;
let guess = '';
let tries = 6;
let score = 0;
let streak = 0;
let gameOver = false;

const wordDisplay = document.getElementById('wordDisplay');
const hintEl = document.getElementById('hint');
const messageEl = document.getElementById('message');
const scoreEl = document.getElementById('score');
const streakEl = document.getElementById('streak');
const triesEl = document.getElementById('tries');

function newGame() {
    const wordData = words[Math.floor(Math.random() * words.length)];
    currentWord = wordData.word;
    currentHint = wordData.hint;
    guess = '';
    tries = 6;
    gameOver = false;
    triesEl.textContent = tries;
    hintEl.textContent = `💡 Hinweis: ${currentHint}`;
    
    // Reset keyboard
    document.querySelectorAll('.key').forEach(key => {
        key.classList.remove('used', 'correct', 'present');
    });
    
    renderWord();
}

function renderWord() {
    wordDisplay.innerHTML = '';
    
    for (let i = 0; i < currentWord.length; i++) {
        const slot = document.createElement('div');
        slot.className = 'letter-slot';
        
        if (guess.length > i) {
            slot.textContent = guess[i];
            slot.classList.add('filled');
        }
        
        wordDisplay.appendChild(slot);
    }
}

function addLetter(letter) {
    if (gameOver) return;
    if (guess.length >= currentWord.length) return;
    
    guess += letter.toUpperCase();
    renderWord();
}

function removeLetter() {
    if (gameOver) return;
    guess = guess.slice(0, -1);
    renderWord();
}

function submitGuess() {
    if (gameOver) return;
    if (guess.length !== currentWord.length) {
        showMessage('❌ Wort zu kurz!');
        return;
    }
    
    const slots = wordDisplay.querySelectorAll('.letter-slot');
    
    for (let i = 0; i < guess.length; i++) {
        const letter = guess[i];
        const key = document.querySelector(`[data-key="${letter.toLowerCase()}"]`);
        
        if (letter === currentWord[i]) {
            slots[i].classList.add('correct');
            if (key) key.classList.add('correct');
        } else if (currentWord.includes(letter)) {
            slots[i].classList.add('wrong');
            setTimeout(() => slots[i].classList.remove('wrong'), 300);
            if (key) key.classList.add('present');
        } else {
            slots[i].classList.add('wrong');
            setTimeout(() => slots[i].classList.remove('wrong'), 300);
            if (key) key.classList.add('used');
        }
    }
    
    if (guess === currentWord) {
        // Win!
        score += tries * 10;
        streak++;
        scoreEl.textContent = score;
        streakEl.textContent = streak;
        gameOver = true;
        showMessage(`🎉 Richtig! +${tries * 10} Punkte`);
        setTimeout(newGame, 2000);
    } else {
        tries--;
        triesEl.textContent = tries;
        guess = '';
        
        if (tries <= 0) {
            gameOver = true;
            streak = 0;
            streakEl.textContent = streak;
            showMessage(`😢 Das Wort war: ${currentWord}`);
            setTimeout(newGame, 2000);
        } else {
            renderWord();
        }
    }
}

function showMessage(text) {
    messageEl.textContent = text;
    messageEl.classList.add('show');
    setTimeout(() => messageEl.classList.remove('show'), 1500);
}

// Keyboard events
document.querySelectorAll('.key').forEach(key => {
    key.addEventListener('click', () => {
        const k = key.dataset.key;
        if (k === 'enter') submitGuess();
        else if (k === 'back') removeLetter();
        else addLetter(k);
    });
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitGuess();
    else if (e.key === 'Backspace') removeLetter();
    else if (/^[a-zA-Z]$/.test(e.key)) addLetter(e.key);
});

newGame();
</script>

</body>
</html>
